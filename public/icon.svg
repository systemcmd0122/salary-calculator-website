<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #2563eb; }
      .fg { fill: #ffffff; }
      .accent { fill: #bfdbfe; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1e40af; }
      .fg { fill: #ffffff; }
      .accent { fill: #93c5fd; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="40" />
  <!-- Calculator body -->
  <rect class="fg" x="50" y="35" width="80" height="110" rx="10" fill-opacity="0.15" />
  <!-- Display -->
  <rect class="fg" x="58" y="43" width="64" height="28" rx="4" />
  <!-- Yen symbol on display -->
  <text class="bg" x="90" y="64" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">¥</text>
  <!-- Buttons row 1 -->
  <rect class="fg" x="58" y="80" width="14" height="14" rx="3" fill-opacity="0.9" />
  <rect class="fg" x="76" y="80" width="14" height="14" rx="3" fill-opacity="0.9" />
  <rect class="fg" x="94" y="80" width="14" height="14" rx="3" fill-opacity="0.9" />
  <rect class="fg" x="112" y="80" width="14" height="14" rx="3" fill-opacity="0.9" />
  <!-- Buttons row 2 -->
  <rect class="fg" x="58" y="98" width="14" height="14" rx="3" fill-opacity="0.9" />
  <rect class="fg" x="76" y="98" width="14" height="14" rx="3" fill-opacity="0.9" />
  <rect class="fg" x="94" y="98" width="14" height="14" rx="3" fill-opacity="0.9" />
  <rect class="fg" x="112" y="98" width="14" height="14" rx="3" fill-opacity="0.7" />
  <!-- Buttons row 3 -->
  <rect class="fg" x="58" y="116" width="14" height="14" rx="3" fill-opacity="0.9" />
  <rect class="fg" x="76" y="116" width="14" height="14" rx="3" fill-opacity="0.9" />
  <rect class="fg" x="94" y="116" width="14" height="14" rx="3" fill-opacity="0.9" />
  <rect class="fg" x="112" y="116" width="14" height="14" rx="3" fill-opacity="0.9" />
  <!-- Bottom row (0 and =) -->
  <rect class="fg" x="58" y="134" width="32" height="10" rx="3" fill-opacity="0.9" />
  <rect class="accent" x="112" y="134" width="14" height="10" rx="3" />
</svg>
